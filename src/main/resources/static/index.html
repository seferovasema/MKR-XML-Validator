<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>XML Validator</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b0f;--surface:#0e1218;--card:#111620;--border:#1a2030;--border2:#222d40;
  --accent:#00e5a0;--accent2:#00b8ff;--error:#ff4d6d;--text:#dde4f0;
  --muted:#4a5568;--muted2:#6b7a94;--glow:rgba(0,229,160,0.12);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;overflow:hidden}
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,229,160,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,0.025) 1px,transparent 1px);
  background-size:44px 44px;pointer-events:none;z-index:0;
}
.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh}

/* Topbar */
.topbar{display:flex;align-items:center;gap:16px;padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-size:17px;font-weight:800;letter-spacing:-0.03em}
.logo span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.topbar-sep{flex:1}
.badge-live{display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);background:rgba(0,229,160,0.07);border:1px solid rgba(0,229,160,0.18);border-radius:100px;padding:4px 12px;letter-spacing:.08em;text-transform:uppercase}
.dot-live{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:blink 1.8s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Layout */
.main{display:flex;flex:1;overflow:hidden}
.panel-left{display:flex;flex-direction:column;width:100%;min-width:300px;border-right:1px solid var(--border);transition:width .35s cubic-bezier(.4,0,.2,1);overflow:hidden}
.split-open .panel-left{width:38%;min-width:300px}
.panel-right{display:flex;flex-direction:column;flex:1;overflow:hidden;opacity:0;pointer-events:none;transform:translateX(16px);transition:opacity .35s ease,transform .35s ease}
.split-open .panel-right{opacity:1;pointer-events:all;transform:translateX(0)}

.panel-header{display:flex;align-items:center;gap:10px;padding:11px 20px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.panel-title{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--muted2);text-transform:uppercase;letter-spacing:.1em}
.panel-body{flex:1;overflow-y:auto;padding:20px}
.panel-body::-webkit-scrollbar{width:4px}
.panel-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}

/* Upload */
.upload-zone{position:relative;border:2px dashed var(--border2);border-radius:14px;padding:36px 20px;text-align:center;cursor:pointer;transition:all .25s;background:var(--card);margin-bottom:14px;overflow:hidden}
.upload-zone::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,var(--glow),transparent 70%);opacity:0;transition:opacity .25s}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--accent);background:rgba(0,229,160,0.03)}
.upload-zone:hover::before,.upload-zone.drag-over::before{opacity:1}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{width:48px;height:48px;margin:0 auto 12px;background:rgba(0,229,160,0.08);border-radius:12px;display:flex;align-items:center;justify-content:center;transition:transform .25s}
.upload-zone:hover .upload-icon{transform:translateY(-3px)}
.upload-icon svg{width:22px;height:22px;color:var(--accent)}
.upload-title{font-size:14px;font-weight:700;margin-bottom:5px}
.upload-sub{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}

/* File chip */
.file-chip{display:none;align-items:center;gap:10px;background:rgba(0,229,160,0.06);border:1px solid rgba(0,229,160,0.2);border-radius:10px;padding:11px 14px;margin-bottom:12px}
.file-chip.show{display:flex}
.chip-icon{width:30px;height:30px;background:rgba(0,229,160,0.1);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chip-name{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chip-size{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);flex-shrink:0}
.chip-remove{background:none;border:none;cursor:pointer;color:var(--muted);padding:3px;border-radius:5px;transition:color .2s;display:flex}
.chip-remove:hover{color:var(--error)}

/* Buttons */
.btn-validate{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#00c87a);border:none;border-radius:11px;color:#000;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;margin-bottom:18px}
.btn-validate::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0.12);opacity:0;transition:opacity .2s}
.btn-validate:hover:not(:disabled)::after{opacity:1}
.btn-validate:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 24px rgba(0,229,160,0.3)}
.btn-validate:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;transform:none;box-shadow:none}
.btn-inner{display:flex;align-items:center;justify-content:center;gap:8px}
.spinner{width:15px;height:15px;border:2px solid rgba(0,0,0,0.25);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;display:none}
.loading .spinner{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── STATİSTİKA KARTI ── */
.stats-card{
  display:none;
  background:rgba(0,229,160,0.05);
  border:1px solid rgba(0,229,160,0.22);
  border-radius:13px;
  padding:16px;
  margin-bottom:14px;
  animation:slideIn .35s ease both;
}
.stats-card.show{display:block}
.stats-card-title{
  display:flex;align-items:center;gap:7px;
  font-size:10px;font-family:'JetBrains Mono',monospace;
  text-transform:uppercase;letter-spacing:.1em;
  color:var(--accent);opacity:.8;
  margin-bottom:12px;
}
.stats-card-title svg{flex-shrink:0}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.stat-cell{
  background:rgba(0,229,160,0.07);
  border:1px solid rgba(0,229,160,0.14);
  border-radius:9px;
  padding:14px 20px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:16px;
}
.stat-val{
  font-family:'JetBrains Mono',monospace;
  font-size:44px;font-weight:700;
  color:var(--accent);
  line-height:1;
  flex-shrink:0;
}
.stat-label{
  font-size:18px;
  font-family:'JetBrains Mono',monospace;
  color:var(--muted2);
  text-transform:uppercase;
  letter-spacing:.06em;
  line-height:1.3;
}

/* Summary bar */
.result-summary{display:none;align-items:center;gap:10px;padding:11px 14px;border-radius:9px;margin-bottom:14px;font-size:13px;font-weight:600}
.result-summary.show{display:flex}
.result-summary.ok{background:rgba(0,229,160,0.08);border:1px solid rgba(0,229,160,0.2);color:var(--accent)}
.result-summary.fail{background:rgba(255,77,109,0.08);border:1px solid rgba(255,77,109,0.2);color:var(--error)}
.summary-count{font-family:'JetBrains Mono',monospace;font-size:11px;margin-left:auto;opacity:.8}

/* Error list */
.error-list{display:flex;flex-direction:column;gap:7px}
.error-item{display:flex;align-items:flex-start;gap:8px;background:var(--card);border:1px solid var(--border);border-left:3px solid var(--error);border-radius:9px;padding:11px 12px;cursor:pointer;transition:all .2s;animation:slideIn .3s ease both}
.error-item:hover{background:rgba(255,77,109,0.05);border-color:rgba(255,77,109,0.25);transform:translateX(2px)}
.error-item.active{background:rgba(255,77,109,0.09);border-color:rgba(255,77,109,0.35)}
.err-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--error);background:rgba(255,77,109,0.1);border-radius:5px;padding:2px 6px;flex-shrink:0;margin-top:2px}
.err-line-badge{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent2);background:rgba(0,184,255,0.1);border-radius:5px;padding:2px 6px;flex-shrink:0;margin-top:2px}
.err-msg{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text);line-height:1.6;word-break:break-word;flex:1}
.err-arrow{color:var(--muted);flex-shrink:0;margin-top:3px;transition:color .2s}
.error-item:hover .err-arrow,.error-item.active .err-arrow{color:var(--error)}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}

/* Editor */
.editor-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:10px;color:var(--muted)}
.editor-empty svg{opacity:.25}
.editor-empty-text{font-size:12px;font-family:'JetBrains Mono',monospace;opacity:.5;text-align:center;padding:0 24px}
.editor-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.editor-container{display:flex;flex:1;overflow:hidden;position:relative}
.line-numbers{padding:14px 0;background:var(--surface);border-right:1px solid var(--border);min-width:50px;text-align:right;overflow:hidden;flex-shrink:0;user-select:none}
.line-num{display:block;padding:0 10px;line-height:21px;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--muted);transition:color .15s,background .15s}
.line-num.active{color:var(--error);background:rgba(255,77,109,0.1)}
.editor-inner{position:relative;flex:1;display:flex;overflow:hidden}
.editor-textarea{flex:1;padding:14px;background:transparent;border:none;outline:none;resize:none;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;line-height:21px;tab-size:2;overflow:auto;caret-color:var(--accent);position:relative;z-index:2}
.editor-textarea::-webkit-scrollbar{width:4px;height:4px}
.editor-textarea::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
.hl-overlay{position:absolute;top:0;left:0;right:0;bottom:0;padding:14px;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:21px;pointer-events:none;overflow:hidden;z-index:1}
.hl-line{display:block;height:21px;background:rgba(255,77,109,0.13);border-left:2px solid var(--error);margin-left:-14px;padding-left:12px;border-radius:0 3px 3px 0}
.hl-blank{display:block;height:21px}
.editor-actions{display:flex;align-items:center;gap:8px;padding:9px 14px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.editor-hint{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-sm{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:7px;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;border:none;cursor:pointer;transition:all .2s}
.btn-dl{background:rgba(0,229,160,0.09);color:var(--accent);border:1px solid rgba(0,229,160,0.2)}
.btn-dl:hover{background:rgba(0,229,160,0.16);transform:translateY(-1px)}
.btn-rev{background:linear-gradient(135deg,var(--accent),#00c87a);color:#000}
.btn-rev:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(0,229,160,0.3)}
.btn-rev:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;transform:none;box-shadow:none}

/* Success */
.success-card{background:rgba(0,229,160,0.05);border:1px solid rgba(0,229,160,0.18);border-radius:12px;padding:24px;text-align:center}
.success-icon{width:48px;height:48px;background:rgba(0,229,160,0.12);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.success-text{font-size:16px;font-weight:700;color:var(--accent);margin-bottom:4px}
.success-sub{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}

/* Net error */
.net-error{background:rgba(255,77,109,0.05);border:1px solid rgba(255,77,109,0.18);border-radius:12px;padding:18px;display:flex;align-items:center;gap:12px}
.net-error-icon{width:38px;height:38px;background:rgba(255,77,109,0.1);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.net-error-text{font-size:13px;color:var(--error);font-weight:600}
.net-error-sub{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px}

/* Resizer */
.resizer{width:4px;background:var(--border);cursor:col-resize;flex-shrink:0;transition:background .2s;position:relative;z-index:10}
.resizer:hover,.resizer.dragging{background:var(--accent)}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .4s ease both}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="logo">XML <span>Validator</span></div>
    <div class="topbar-sep"></div>
    <div class="badge-live"><span class="dot-live"></span>POST /mkr/validate</div>
  </div>

  <div class="main" id="main">

    <!-- LEFT -->
    <div class="panel-left" id="panelLeft">
      <div class="panel-header">
        <span class="panel-title">Fayl &amp; Nəticələr</span>
      </div>
      <div class="panel-body">

        <div class="upload-zone anim" id="uploadZone" style="animation-delay:.05s">
          <input type="file" id="fileInput" accept=".xml,application/xml,text/xml"/>
          <div class="upload-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </div>
          <div class="upload-title">XML faylı seçin</div>
          <div class="upload-sub">Sürükləyin və ya klikləyin · yalnız .xml</div>
        </div>

        <div class="file-chip" id="fileChip">
          <div class="chip-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00e5a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
          </div>
          <span class="chip-name" id="chipName"></span>
          <span class="chip-size" id="chipSize"></span>
          <button class="chip-remove" id="chipRemove">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>

        <button class="btn-validate anim" id="validateBtn" disabled style="animation-delay:.1s">
          <div class="btn-inner">
            <div class="spinner" id="spinner"></div>
            <span id="btnText">Fayl seçin</span>
          </div>
        </button>

        <!-- STATİSTİKA KARTI (xətalar bölməsindən əvvəl) -->
        <div class="stats-card" id="statsCard">
          <div class="stats-card-title">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
              <line x1="6" y1="20" x2="6" y2="14"/>
            </svg>
            Statistika
          </div>
          <div class="stats-grid">
            <div class="stat-cell">
              <div class="stat-val" id="statTotal">—</div>
              <div class="stat-label">Ümumi<br/>Kreditlər</div>
            </div>
            <div class="stat-cell">
              <div class="stat-val" id="statYesterday">—</div>
              <div class="stat-label">Dünən<br/>Verilmiş<br/>Kreditlər</div>
            </div>
            <div class="stat-cell">
              <div class="stat-val" id="statClosed">—</div>
              <div class="stat-label">Bağlanmış<br/>Kreditlər</div>
            </div>
          </div>
        </div>

        <div class="result-summary" id="resultSummary">
          <svg width="15" height="15" id="summaryIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></svg>
          <span id="summaryText"></span>
          <span class="summary-count" id="summaryCount"></span>
        </div>

        <div id="resultsBody"></div>

      </div>
    </div>

    <!-- RESIZER -->
    <div class="resizer" id="resizer"></div>

    <!-- RIGHT -->
    <div class="panel-right" id="panelRight">
      <div class="panel-header">
        <span class="panel-title">XML Redaktoru</span>
        <span id="editorFileName" style="margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted2)"></span>
      </div>

      <div class="editor-empty" id="editorEmpty">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="9" y1="15" x2="15" y2="15"/>
        </svg>
        <span class="editor-empty-text">Solda bir xəta üzərinə klikləyin —<br/>redaktor açılacaq, xətalı sətir vurğulanacaq</span>
      </div>

      <div class="editor-wrap" id="editorWrap" style="display:none">
        <div class="editor-container">
          <div class="line-numbers" id="lineNumbers"></div>
          <div class="editor-inner">
            <div class="hl-overlay" id="hlOverlay"></div>
            <textarea class="editor-textarea" id="editorTextarea" spellcheck="false"></textarea>
          </div>
        </div>
        <div class="editor-actions">
          <span class="editor-hint" id="editorHint"></span>
          <button class="btn-sm btn-dl" id="btnDownload">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Yüklə
          </button>
          <button class="btn-sm btn-rev" id="btnRevalidate">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
            Yenidən Yoxla
          </button>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
let selectedFile=null, xmlContent='', currentErrors=[], highlightedLines=new Set();

const $ = id => document.getElementById(id);
const main=$('main'), fileInput=$('fileInput'), uploadZone=$('uploadZone');
const fileChip=$('fileChip'), chipName=$('chipName'), chipSize=$('chipSize'), chipRemove=$('chipRemove');
const validateBtn=$('validateBtn'), spinner=$('spinner'), btnText=$('btnText');
const resultSummary=$('resultSummary'), summaryIcon=$('summaryIcon'), summaryText=$('summaryText'), summaryCount=$('summaryCount');
const resultsBody=$('resultsBody'), editorEmpty=$('editorEmpty'), editorWrap=$('editorWrap');
const editorTextarea=$('editorTextarea'), lineNumbers=$('lineNumbers'), hlOverlay=$('hlOverlay');
const editorHint=$('editorHint'), btnDownload=$('btnDownload'), btnRevalidate=$('btnRevalidate');
const editorFileName=$('editorFileName'), panelLeft=$('panelLeft'), resizer=$('resizer');
const statsCard=$('statsCard'), statTotal=$('statTotal'), statYesterday=$('statYesterday'), statClosed=$('statClosed');

function fmtSize(b){return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB'}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function extractLine(msg){
  const pats=[/\bline[:\s]+(\d+)/i,/\bsatır[:\s]+(\d+)/i,/:(\d+):\d+/,/\[(\d+),/,/row[:\s]+(\d+)/i];
  for(const p of pats){const m=msg.match(p);if(m)return parseInt(m[1])}
  return null;
}

function setFile(file){
  if(!file)return;
  if(!file.name.toLowerCase().endsWith('.xml')){
    showNetError('Yalnız .xml formatı qəbul edilir',file.name);return;
  }
  selectedFile=file;
  chipName.textContent=file.name; chipSize.textContent=fmtSize(file.size);
  fileChip.classList.add('show');
  validateBtn.disabled=false; btnText.textContent='Yoxla';
  resultSummary.classList.remove('show'); resultsBody.innerHTML='';
  statsCard.classList.remove('show');
  main.classList.remove('split-open');
  editorEmpty.style.display='flex'; editorWrap.style.display='none';
  editorFileName.textContent=''; xmlContent='';
  const r=new FileReader();
  r.onload=e=>{xmlContent=e.target.result};
  r.readAsText(file);
}

function clearFile(){
  selectedFile=null;xmlContent='';fileInput.value='';
  fileChip.classList.remove('show');
  validateBtn.disabled=true;btnText.textContent='Fayl seçin';
  resultSummary.classList.remove('show');resultsBody.innerHTML='';
  statsCard.classList.remove('show');
  main.classList.remove('split-open');
  editorEmpty.style.display='flex';editorWrap.style.display='none';
  editorFileName.textContent='';currentErrors=[];
}

fileInput.addEventListener('change',e=>setFile(e.target.files[0]));
chipRemove.addEventListener('click',e=>{e.stopPropagation();clearFile()});
uploadZone.addEventListener('dragover',e=>{e.preventDefault();uploadZone.classList.add('drag-over')});
uploadZone.addEventListener('dragleave',()=>uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop',e=>{e.preventDefault();uploadZone.classList.remove('drag-over');setFile(e.dataTransfer.files[0])});

function setLoading(on){
  validateBtn.disabled=on;
  validateBtn.classList.toggle('loading',on);
  spinner.style.display=on?'block':'none';
  btnText.textContent=on?'Yoxlanılır...':'Yoxla';
}

function showStats(statsMap){
  if(!statsMap||typeof statsMap!=='object'){statsCard.classList.remove('show');return;}
  // Map<String,Object> cavabından dəyərləri oxu
  const total    = statsMap['Ümumi kreditlərin sayı']     ?? statsMap['umumi']    ?? '—';
  const yesterday= statsMap['Dünən verilmiş kreditlərin sayı'] ?? statsMap['dunen'] ?? '—';
  const closed   = statsMap['Bağlanmış kreditlərin sayı'] ?? statsMap['baglanan'] ?? '—';
  statTotal.textContent     = total;
  statYesterday.textContent = yesterday;
  statClosed.textContent    = closed;
  statsCard.classList.add('show');
}

async function doValidate(blob,fname){
  setLoading(true);
  statsCard.classList.remove('show');
  const fd=new FormData();
  fd.append('file',blob,fname||'file.xml');
  try{
    // 1) Statistika sorğusu
    try{
      const sRes=await fetch('/mkr/statistica',{method:'POST',body:buildFD(blob,fname)});
      if(sRes.ok){
        const sData=await sRes.json();
        showStats(sData);
      }
    }catch(_){}


    const fd2=new FormData();
    fd2.append('file',blob,fname||'file.xml');
    const res=await fetch('/mkr/validate',{method:'POST',body:fd2});
    if(!res.ok){const t=await res.text().catch(()=>'');showNetError(`Server xətası: ${res.status}`,t.substring(0,100));return}
    const data=await res.json();
    currentErrors=Array.isArray(data)?data:[];
    showResults(currentErrors);
  }catch(err){
    showNetError('Serverə qoşulmaq mümkün olmadı',err.message);
  }finally{setLoading(false)}
}

function buildFD(blob,fname){
  const f=new FormData();
  f.append('file',blob,fname||'file.xml');
  return f;
}

validateBtn.addEventListener('click',()=>{if(selectedFile)doValidate(selectedFile,selectedFile.name)});

function showNetError(msg,detail){
  resultSummary.classList.remove('show');
  resultsBody.innerHTML=`<div class="net-error"><div class="net-error-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ff4d6d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div><div class="net-error-text">${esc(msg)}</div>${detail?`<div class="net-error-sub">${esc(detail)}</div>`:''}</div></div>`;
}

function showResults(errors){
  resultSummary.classList.add('show');
  if(!errors||errors.length===0){
    resultSummary.className='result-summary show ok';
    summaryIcon.innerHTML='<polyline points="20 6 9 17 4 12"/>';
    summaryText.textContent='XML uğurla yoxlandı'; summaryCount.textContent='0 xəta';
    resultsBody.innerHTML=`<div class="success-card"><div class="success-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00e5a0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div><div class="success-text">Heç bir xəta tapılmadı</div><div class="success-sub">Fayl validasiyanı keçdi</div></div>`;
    main.classList.remove('split-open');
  }else{
    resultSummary.className='result-summary show fail';
    summaryIcon.innerHTML='<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>';
    summaryText.textContent='Xətalar aşkar edildi'; summaryCount.textContent=`${errors.length} xəta`;
    resultsBody.innerHTML=`<div class="error-list">${errors.map((msg,i)=>{
      const line=extractLine(msg);
      return `<div class="error-item" data-idx="${i}" data-line="${line||''}" style="animation-delay:${i*.04}s">
        <span class="err-num">#${String(i+1).padStart(2,'0')}</span>
        ${line?`<span class="err-line-badge">S.${line}</span>`:''}
        <span class="err-msg">${esc(msg)}</span>
        <svg class="err-arrow" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>`;
    }).join('')}</div>`;
    document.querySelectorAll('.error-item').forEach(el=>{
      el.addEventListener('click',()=>{
        const line=el.dataset.line?parseInt(el.dataset.line):null;
        openEditor(parseInt(el.dataset.idx),line,el);
      });
    });
  }
}

function openEditor(idx,targetLine,el){
  document.querySelectorAll('.error-item').forEach(e=>e.classList.remove('active'));
  if(el)el.classList.add('active');
  if(!xmlContent){editorHint.textContent='Fayl məzmunu yüklənmədi';return}
  main.classList.add('split-open');
  editorEmpty.style.display='none';
  editorWrap.style.display='flex';
  if(selectedFile)editorFileName.textContent=selectedFile.name;
  editorTextarea.value=xmlContent;
  highlightedLines.clear();
  if(targetLine)highlightedLines.add(targetLine);
  renderLineNumbers();
  renderHighlight();
  if(targetLine){
    editorHint.textContent=`Sətir ${targetLine} vurğulandı · redaktə edin`;
    scrollToLine(targetLine);
  }else{
    editorHint.textContent='Redaktə edin, sonra "Yenidən Yoxla" basın';
  }
}

function renderLineNumbers(){
  const lines=editorTextarea.value.split('\n');
  lineNumbers.innerHTML=lines.map((_,i)=>{
    const n=i+1;
    return `<span class="line-num${highlightedLines.has(n)?' active':''}">${n}</span>`;
  }).join('');
}

function renderHighlight(){
  const lines=editorTextarea.value.split('\n');
  hlOverlay.innerHTML=lines.map((_,i)=>{
    const n=i+1;
    return highlightedLines.has(n)
      ?`<span class="hl-line"></span>`
      :`<span class="hl-blank"></span>`;
  }).join('');
}

function scrollToLine(line){
  const top=Math.max(0,(line-5)*21);
  editorTextarea.scrollTop=top;
  lineNumbers.scrollTop=top;
  hlOverlay.scrollTop=top;
}

editorTextarea.addEventListener('scroll',()=>{
  lineNumbers.scrollTop=editorTextarea.scrollTop;
  hlOverlay.scrollTop=editorTextarea.scrollTop;
});

editorTextarea.addEventListener('input',()=>{
  xmlContent=editorTextarea.value;
  renderLineNumbers();
  if(highlightedLines.size>0)renderHighlight();
});

btnDownload.addEventListener('click',()=>{
  const blob=new Blob([editorTextarea.value],{type:'application/xml'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download=(selectedFile?selectedFile.name.replace(/\.xml$/i,''):'edited')+'_edited.xml';
  a.click();URL.revokeObjectURL(url);
});

btnRevalidate.addEventListener('click',()=>{
  xmlContent=editorTextarea.value;
  highlightedLines.clear();
  hlOverlay.innerHTML='';
  renderLineNumbers();
  const blob=new Blob([xmlContent],{type:'application/xml'});
  const fname=selectedFile?selectedFile.name:'edited.xml';
  doValidate(blob,fname);
});

// Resizer drag
let resizing=false;
resizer.addEventListener('mousedown',e=>{resizing=true;resizer.classList.add('dragging');e.preventDefault()});
document.addEventListener('mousemove',e=>{
  if(!resizing)return;
  const r=main.getBoundingClientRect();
  const pct=((e.clientX-r.left)/r.width)*100;
  panelLeft.style.width=Math.max(25,Math.min(65,pct))+'%';
});
document.addEventListener('mouseup',()=>{if(resizing){resizing=false;resizer.classList.remove('dragging')}});
</script>
</body>
</html>
